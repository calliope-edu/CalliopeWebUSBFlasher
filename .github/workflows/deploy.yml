name: Deploy to GitHub Pages

on:
  workflow_dispatch:   # Manual trigger only

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download demo hex files
        run: |
          echo "Downloading Calliope demo hex files..."
          curl -fSL -o hex/Demov3.hex  "http://go.calliope.cc/downloads/Demov3.hex"
          curl -fSL -o hex/Demov1.hex  "http://go.calliope.cc/downloads/Demov1.hex"
          echo "Demov3.hex: $(wc -c < hex/Demov3.hex) bytes"
          echo "Demov1.hex: $(wc -c < hex/Demov1.hex) bytes"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
